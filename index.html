<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Nexus AI | Wallet</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div class="max-w-2xl mx-auto p-6 min-h-screen flex flex-col">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-400">Arc Nexus AI</h1>
            <p class="text-slate-400">Unified Control Layer for Base/Arc</p>
        </header>

        <!-- Chat Area -->
        <div id="chat-box" class="flex-grow bg-slate-800 p-4 rounded-lg shadow-lg mb-4 h-96 overflow-y-auto">
            <div class="text-slate-400 text-center mt-32">Chat starts here...</div>
        </div>

        <!-- Input Area -->
        <div class="flex gap-2">
            <input id="user-input" type="text" 
                placeholder="Ask to swap, bridge or transfer..." 
                class="flex-grow p-3 rounded-lg bg-slate-700 border border-slate-600 focus:outline-none focus:border-blue-500">
            <button onclick="sendMessage()" class="bg-blue-600 px-6 py-3 rounded-lg font-bold hover:bg-blue-700">Send</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value;

            if (message.trim() === "") return;

            // Clear placeholder
            if (chatBox.innerHTML.includes("Chat starts here...")) chatBox.innerHTML = "";

            // User Message
            chatBox.innerHTML += `<div class="mb-4 text-right"><span class="bg-blue-900 px-4 py-2 rounded-lg">${message}</span></div>`;

            // Simulate AI Response
            setTimeout(() => {
                chatBox.innerHTML += `<div class="mb-4 text-left"><span class="bg-slate-600 px-4 py-2 rounded-lg">AI: Processing your request on Arc Network...</span></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);

            inputField.value = "";
        }
    </script>
</body>
</html>
