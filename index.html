<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Nexus AI | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div class="max-w-2xl mx-auto p-4 min-h-screen flex flex-col">
        <!-- Header with Optimized Logo -->
        <header class="mb-6 text-center flex flex-col items-center justify-center">
            <!-- লোগোটি এখানে ব্যাকগ্রাউন্ড হিসেবে সেট করা হয়েছে যাতে তা ভাঙবে না -->
            <div class="w-24 h-24 mb-3 rounded-2xl shadow-lg bg-slate-800" 
                 style="background-image: url('1000227687_3.jpg'); background-size: contain; background-repeat: no-repeat; background-position: center;">
            </div>
            <div>
                <h1 class="text-2xl font-bold text-blue-400">Arc Nexus AI</h1>
                <p class="text-slate-400 text-sm">Unified Control Layer for Base/Arc</p>
            </div>
        </header>

        <!-- Chat Area -->
        <div id="chat-box" class="flex-grow bg-slate-800 p-4 rounded-xl shadow-lg mb-4 h-80 overflow-y-auto border border-slate-700">
            <div class="text-slate-500 text-center mt-20">Chat starts here...</div>
        </div>

        <!-- Input Area -->
        <div class="flex gap-2 pb-2">
            <input id="user-input" type="text" 
                placeholder="Ask to swap, bridge or transfer..." 
                class="flex-grow p-3 rounded-lg bg-slate-700 border border-slate-600 focus:outline-none focus:border-blue-500 text-sm">
            <button onclick="sendMessage()" class="bg-blue-600 px-5 py-3 rounded-lg font-bold hover:bg-blue-700 text-sm">Send</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value.trim();

            if (message === "") return;

            if (chatBox.innerHTML.includes("Chat starts here...")) chatBox.innerHTML = "";

            chatBox.innerHTML += `<div class="mb-3 text-right"><span class="bg-blue-900 px-3 py-1.5 rounded-lg text-sm">${message}</span></div>`;

            setTimeout(() => {
                chatBox.innerHTML += `<div class="mb-3 text-left"><span class="bg-slate-600 px-3 py-1.5 rounded-lg text-sm">AI: Processing your request...</span></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);

            inputField.value = "";
        }
    </script>
</body>
</html>
